  /api/v3/orders/stickers/cross-border:
    servers:
      - url: https://marketplace-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: marketplace
      security:
        - HeaderApiKey: []
      tags:
        - Сборочные задания FBS
      summary: Получить стикеры сборочных заданий трансграничных поставок
      description: |
        Метод возвращает список стикеров [сборочных заданий](/openapi/orders-fbs#tag/Sborochnye-zadaniya-FBS/paths/~1api~1v3~1orders/get) трансграничных поставок в формате PDF.<br><br>

        Для каждого сборочного задания в ответе указывается статус генерации стикера:
          - `awaitingTrackNumber` — стикер не готов. Ожидается трек-номер от перевозчика.
          - `ready` — стикер готов

        <div class="description_important">
          Стикер может генерироваться с задержкой. Повторяйте запрос, пока не получите статус <code>ready</code>.
        </div>

        Ограничения:
          - За один запрос можно получить максимум 100 стикеров.
          - Можно получить стикеры только для сборочных заданий, находящихся на сборке или в доставке — [статусы](/openapi/orders-fbs#tag/Sborochnye-zadaniya-FBS/paths/~1api~1v3~1orders~1status/post) `confirm`, `complete`.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца для методов <strong>сборочных заданий, поставок и пропусков FBS</strong>:

        | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- |
        | 1 мин | 300 запросов | 200 мс | 20 запросов |

        Один запрос с кодами ответов <code>4XX</code> учитывается как 10 запросов
        </div>
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                orders:
                  type: array
                  minItems: 1
                  maxItems: 100
                  description: Список ID сборочных заданий
                  items:
                    type: integer
                    format: int64
                    example: 3869227998
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  stickers:
                    type: array
                    nullable: false
                    items:
                      type: object
                      properties:
                        orderId:
                          type: integer
                          nullable: false
                          description: ID сборочного задания
                          example: 3869227998
                        status:
                          type: string
                          nullable: false
                          enum:
                            - awaitingTrackNumber
                            - ready
                          description: |
                            Статус генерации стикера:
                              - `awaitingTrackNumber` — стикер не готов. Ожидается трек-номер от перевозчика.
                              - `ready` — стикер готов
                          example: ready
                        parcelId:
                          type: string
                          description: Трек-номер в стикере для отслеживания сборочного задания
                          example: WB0000000001
                        file:
                          type: string
                          format: byte
                          nullable: false
                          description: Стикер в формате PDF, кодировка base64
                          example: 
                        partA:
                          type: string
                          nullable: false
                          description: Первая часть ID стикера для печати подписи
                          example: '231648'
                        partB:
                          type: string
                          nullable: false
                          description: Вторая часть ID стикера для печати подписи
                          example: '9753'
                        barcode:
                          type: string
                          nullable: false
                          description: Закодированное значение стикера
                          example: '!uKEtQZVx'
              example:
                stickers:
                  - orderId: 987654320
                    status: awaitingTrackNumber
                    parcelId: ''
                    file: ''
                    partA: ''
                    partB: ''
                    barcode: ''
                  - orderId: 123456789
                    status: ready
                    parcelId: WB0000000001
                    file: 
                    partA: '231648'
                    partB: '9753'
                    barcode: '!uKEtQZVx'
        '400':
          description: Неправильный запрос
