              type: number
              format: float64
              nullable: false
              description: Широта
              example: 40.20192
        scanPrice:
          type: number
          format: uint32
          nullable: true
          description: Цена приёмки в копейках. Отображается после фактической приёмки заказа
          example: 1500
        deliveryType:
          type: string
          nullable: false
          description: |
