  schemas:
    v3.ArchiveOrders:
      type: object
      description: Список архивных сборочных заданий
      required:
        - orders
        - next
      properties:
        next:
          description: Параметр пагинации. Содержит значение, которое необходимо указать в запросе для получения следующего пакета данных
          type: integer
          format: int64
          nullable: true
        orders:
          description: Архивные сборочные задания
          type: array
          items:
            $ref: '#/components/schemas/v3.ArchiveOrder'
    v3.ArchiveOrder:
      type: object
      description: Архивное сборочное задание
      required:
        - cargoType
        - colorCode
        - createdAt
        - crossBorder
        - crossBorderType
        - id
        - isZeroOrder
        - metaDetails
        - options
        - orderUid
        - priceInfo
        - product
        - rid
        - scanPrice
        - status
        - stickerId
        - supplyId
        - warehouseId
      properties:
        cargoType:
          description: |
            Тип товара:
              - `mgt` — малогабаритный товар (МГТ)
              - `sgt` — сверхгабаритный товар (СГТ)
              - `kgtPlus` — крупногабаритный товар (КГТ+)
          type: string
          example: mgt
        colorCode:
          description: Код цвета для колеруемых товаров
          type: string
          example: RAL 3017
          nullable: true
        createdAt:
          description: Дата создания заказа
          type: string
          example: '2022-05-04'
        crossBorder:
          description: Информация о заказе по модели кроссбордер
          type: object
          nullable: true
          properties:
            parcel:
              description: ID посылки
              type: string
              example: 1Z999AA10123456784
        crossBorderType:
          description: |
            Тип сборочного задания:
              - `local` — внутренняя поставка
              - `crossBorder` — трансграничная поставка
          type: string
          example: crossBorder
        id:
          description: ID сборочного задания
          type: integer
          example: 1234567890
        isZeroOrder:
          description: |
            Признак заказа товара с нулевым остатком:
              - `false` — заказ сделан на товар с ненулевым остатком
              - `true` — заказ сделан на товар с нулевым остатком
          type: boolean
          example: false
        metaDetails:
          description: Идентификаторы маркировки сборочного задания
          $ref: '#/components/schemas/MetaDetails'
          type: array
        options:
          description: Опции заказа
          type: object
          properties:
            isB2B:
              description: |
                Признак B2B-продажи:
                  - `false` — не B2B-продажа
                  - `true` — B2B-продажа
              type: boolean
              example: false
        orderUid:
          description: ID транзакции для группировки сборочных заданий. Сборочные задания в одной корзине покупателя будут иметь одинаковый `orderUid`
          type: string
          example: 165918930_629fbc924b984618a44354475ca58675
        priceInfo:
          description: Информация о цене заказа
          type: object
          required:
            - convertedCurrencyCode
            - convertedPrice
            - currencyCode
            - price
          properties:
            convertedCurrencyCode:
              description: Код валюты страны продавца
              type: integer
              example: 643
            convertedPrice:
              description: Цена в валюте страны продавца с учетом всех скидок, кроме скидки по WB Кошельку, умноженная на 100
              type: integer
              example: 1020
            currencyCode:
              description: Код валюты продажи
              type: integer
              example: 643
            price:
              description: Цена в валюте продажи с учетом всех скидок, кроме скидки по WB Кошельку, умноженная на 100
              type: integer
              example: 1020
        product:
          description: Информация о товаре
          type: object
          required:
            - article
            - chrtId
            - nmId
            - skus
          properties:
            article:
              description: Артикул продавца
              type: string
              example: wv1702fyjh
            chrtId:
              description: ID размера товара в системе WB
              type: integer
              example: 12345678
            nmId:
              description: Артикул WB
              type: integer
              example: 370870300
            skus:
              description: Список баркодов
              items:
                type: string
              type: array
              example:
                - 12345Ejf5
                - 12345Ejf6
                - 12345Ejf7
        rid:
          description: |
            Уникальный ID заказа. <br>
            Примечание: `rid` — это `srid` в ответах методов:
              - [Заявки покупателей на возврат](./user-communication#tag/Vozvraty-pokupatelyami/paths/~1api~1v1~1claims/get)
              - [Заказы](./reports#tag/Osnovnye-otchyoty/paths/~1api~1v1~1supplier~1orders/get)
              - [Продажи](./reports#tag/Osnovnye-otchyoty/paths/~1api~1v1~1supplier~1sales/get)
              - [Отчёт о возвратах и перемещении товаров](./reports#tag/Otchyot-o-vozvratah-i-peremeshenii-tovarov)
              - [Детализации к отчётам реализации по ID отчётов](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1SalesReportsDetailedReportId)
              - [Детализации к отчётам реализации за период](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1SalesReportsDetailed)
              - [Детализации к отчётам об издержках на приём платежей по ID отчётов](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1AcquiringDetailedReportId)
              - [Детализации к отчётам об издержках на приём платежей за период](./financial-reports-and-accounting#tag/Finansovye-otchyoty/operation/postV1AcquiringDetailed)
          type: string
          example: f884001e44e511edb8780242ac120002
        scanPrice:
          description: Цена приёмки заказа в копейках
          type: integer
          nullable: true
          example: 5200
        status:
          description: Последние статусы сборочного задания
          required:
            - supplierStatus
            - wbStatus
          properties:
            supplierStatus:
              description: Статус сборочного задания, установленный продавцом
              example: complete
              type: string
            wbStatus:
              description: Статус сборочного задания в системе Wildberries
              example: sent_to_carrier
              type: string
          type: object
        stickerId:
          description: ID стикера
          example: 33811984302
          type: integer
        supplyId:
          description: ID поставки
          example: WB-GI-1234588
          type: string
          nullable: true
        warehouseId:
          description: ID склада продавца, с которого был отгружен товар
          example: 55684681
          type: integer
    v3.SupplyOrderIDsAPI:
      type: object
