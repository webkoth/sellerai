    AcquiringReportListReq:
      type: object
      description: Параметры запроса
      required:
        - dateFrom
        - dateTo
      properties:
        dateFrom:
          type: string
          description: |
            Начальная дата отчёта.<br>Можно передать дату или дату со временем. Время можно указывать с точностью до секунд или миллисекунд.<br>Дата передаётся в формате [RFC3339](https://datatracker.ietf.org/doc/html/rfc3339), время — в часовом поясе Москва `UTC+3`.<br>Примеры:
              - `2025-06-20`
              - `2025-06-20T23:59:59`
              - `2025-06-20T00:00:00.12345`
              - `2025-06-20T00:00:00`
          example: '2026-03-17'
        dateTo:
          type: string
          description: |
            Конечная дата отчёта.<br>Дата в формате [RFC3339](https://datatracker.ietf.org/doc/html/rfc3339). Можно передать дату или дату со временем. Время можно указывать с точностью до секунд или миллисекунд.<br>Время передаётся в часовом поясе Москва `UTC+3`.<br>Примеры:
              - `2025-06-20`
              - `2025-06-20T23:59:59`
              - `2025-06-20T00:00:00.12345`
              - `2025-06-20T00:00:00`
          example: '2026-03-20'
        limit:
          type: integer
          maximum: 1000
          default: 1000
          description: Количество отчётов в ответе
          example: 211
        offset:
          type: integer
          default: 0
          description: Сколько элементов пропустить. Например, для значения `10` ответ начнётся с 11 элемента
          example: 345
