  /api/v5/supplier/reportDetailByPeriod:
    servers:
      - url: https://statistics-api.wildberries.ru
    get:
      deprecated: true
      x-readonly-method: true
      x-category: statistics
      security:
        - HeaderApiKey: []
      summary: Отчёт о продажах по реализации
      description: |
        Данный метод устарел. Он будет удалён [15 июля](https://dev.wildberries.ru/release-notes?id=498).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 мин | 1 запрос | 1 мин | 10 запросов |
        | Сервисный | 1 мин | 1 запрос | 1 мин | 10 запросов |
        | Базовый с секретом | 1 мин | 1 запрос | 1 мин | 10 запросов |
        | Базовый | 24 ч | 2 запроса | 12 ч | 1 запрос |
        </div>
      tags:
        - Финансовые отчёты
      parameters:
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          required: true
          description: |
            Начальная дата отчёта.<br>
            Дата в формате RFC3339. Можно передать дату или дату со временем.
            Время можно указывать с точностью до секунд или миллисекунд. <br>
            Время передаётся в часовом поясе Москва (UTC+3).
            <br>Примеры:
              - `2019-06-20`
              - `2019-06-20T23:59:59`
              - `2019-06-20T00:00:00.12345`
              - `2017-03-25T00:00:00`
        - in: query
          name: dateTo
          schema:
            type: string
            format: date-time
          required: true
          description: Конечная дата отчёта
        - in: query
          name: limit
          schema:
            type: integer
            default: 100000
            maximum: 100000
          required: false
          description: Количество строк в ответе
        - in: query
          name: rrdid
          schema:
            type: integer
            default: 0
          required: false
          description: |
            Уникальный ID строки отчёта. Необходим для получения отчёта частями.
            <br>
            Загрузку отчёта нужно начинать с `rrdid = 0` и при последующих вызовах API передавать в запросе значение `rrd_id` из последней строки, полученной в результате предыдущего вызова.
            <br>
            Таким образом, для загрузки одного отчёта может понадобиться вызывать API до тех пор, пока не вернётся ответ 204.
        - in: query
          name: period
          schema:
            type: string
            enum:
              - weekly
              - daily
            default: weekly
          required: false
          description: |
            Периодичность отчётов:
              - `weekly` — еженедельные
              - `daily` — ежедневные
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DetailReportItem'
        '204':
          description: Нет данных
        '400':
          $ref: '#/components/responses/response400FinancialReports'
        '401':
          $ref: '#/components/responses/401'
        '402':
          $ref: '#/components/responses/402'
        '429':
          $ref: '#/components/responses/429'
