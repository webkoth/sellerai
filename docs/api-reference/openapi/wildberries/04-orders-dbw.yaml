components:
  securitySchemes:
    HeaderApiKey:
      type: apiKey
      name: Authorization
      in: header
  parameters:
    Order:
      name: orderId
      in: path
      required: true
      description: ID сборочного задания
      schema:
        type: integer
        format: int64
        example: 5632423
    Next:
      name: next
      in: query
      required: true
      schema:
        type: integer
        format: int64
      description: Параметр пагинации. Устанавливает значение, с которого надо получить следующий пакет данных. Для получения полного списка данных должен быть равен `0` в первом запросе. Для следующих запросов необходимо брать значения из одноименного поля в ответе
    Limit:
      name: limit
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 1000
      description: Параметр пагинации. Устанавливает предельное количество возвращаемых данных
  examples:
    IncorrectRequestBody:
      description: Некорректное тело запроса
      value:
        code: IncorrectRequestBody
        message: ''
    IncorrectRequest:
      value:
        code: IncorrectRequest
        message: ''
    IncorrectRequest1:
      description: Некорректный запрос
      value:
        code: IncorrectRequest
        message: ''
    IncorrectParameter:
      value:
        code: IncorrectParameter
        message: ''
    FailedToUpdateMeta:
      value:
        code: FailedToUpdateMeta
        message: ''
    StatusMismatch:
      value:
        data: {}
        code: StatusMismatch
        message: ''
  responses:
    '401':
      description: Не авторизован
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Заголовок ошибки
              detail:
                type: string
                description: Детали ошибки
              code:
                type: string
                description: Внутренний код ошибки
              requestId:
                type: string
                description: Уникальный ID запроса
              origin:
                type: string
                description: ID внутреннего сервиса WB
              status:
                type: number
                description: HTTP статус-код
              statusText:
                type: string
                description: Расшифровка HTTP статус-кода
              timestamp:
                type: string
                format: date-time
                description: Дата и время запроса
          example:
            title: unauthorized
            detail: 'token problem; token is malformed: could not base64 decode signature: illegal base64 data at input byte 84'
            code: 07e4668e--a53a3d31f8b0-[UK-oWaVDUqNrKG]; 03bce=277; 84bd353bf-75
            requestId: 7b80742415072fe8b6b7f7761f1d1211
            origin: s2s-api-auth-catalog
            status: 401
            statusText: Unauthorized
            timestamp: '2024-09-30T06:52:38Z'
    '402':
      description: Требуется платёж
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Заголовок ошибки
              detail:
                type: string
                description: Детали ошибки. Ошибка возвращается только сервисам из [Каталога решений для бизнеса](https://dev.wildberries.ru/business-solutions)
          example:
            title: payment required
            detail: wb solution for business has insufficient funds on its balance. please top up the balance in the company's personal account https://dev.wildberries.ru/company
    '429':
      description: Слишком много запросов
      content:
        application/problem+json:
          schema:
            type: object
            properties:
              title:
                type: string
                description: Заголовок ошибки
              detail:
                type: string
                description: Детали ошибки
              code:
                type: string
                description: Внутренний код ошибки
              requestId:
                type: string
                description: Уникальный ID запроса
              origin:
                type: string
                description: ID внутреннего сервиса WB
              status:
                type: number
                description: HTTP статус-код
              statusText:
                type: string
                description: Расшифровка HTTP статус-кода
              timestamp:
                type: string
                format: date-time
                description: Дата и время запроса
          example:
            title: too many requests
            detail: limited by c122a060-a7fb-4bb4-abb0-32fd4e18d489
            code: 07e4668e-ac2242c5c8c5-[UK-4dx7JUdskGZ]
            requestId: 9d3c02cc698f8b041c661a7c28bed293
            origin: s2s-api-auth-catalog
            status: 429
            statusText: Too Many Requests
            timestamp: '2024-09-30T06:52:38Z'
    NotFound:
      description: Не найдено
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: NotFound
            message: ''
    AccessDenied:
      description: Доступ запрещён
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            code: AccessDenied
            message: ''
  schemas:
    api.OrdersSGTINsSetRequest:
      type: object
      required:
        - orders
      properties:
        orders:
          type: array
          maxItems: 1000
          items:
            $ref: '#/components/schemas/api.SGTINs'
    api.SGTINs:
      type: object
      properties:
        orderId:
          description: ID сборочного задания
          type: integer
          example: 123456
        sgtins:
          type: array
          minItems: 1
          maxItems: 24
          description: Массив кодов маркировки. Допускается от 16 до 135 символов для кода одной маркировки
          example:
            - '123456789012345678'
            - '1234567890123456'
          items:
            type: string
    api.StatusSetResponses:
      type: object
      required:
        - results
      example:
        requestId: 03615778-eb9e-4f55-b4Of-fd3ac0fad2сc
        results:
          - orderId: 4299281547
            isError: true
            errors:
              - code: 404
                detail: NotFound
          - orderId: 4279781545
            isError: false
      properties:
        requestId:
          type: string
          description: Уникальный ID запроса, содержащего ошибки.
        results:
          type: array
          items:
            $ref: '#/components/schemas/api.StatusSetResponse'
    api.StatusSetResponse:
      type: object
      required:
        - isError
        - orderId
      properties:
        errors:
          items:
            $ref: '#/components/schemas/api.BatchErrorResponse'
          type: array
          description: Детали ошибки
        isError:
          type: boolean
          description: Есть ли ошибки
          example: true
        orderId:
          type: integer
          description: ID сборочного задания с успешно обновлёнными данными
          example: 123456
    api.BatchErrorResponse:
      required:
        - code
        - detail
      properties:
        code:
          type: integer
          description: |
            Код ошибки:
              - `404`
              - `409`
          example: 404
        detail:
          type: string
          description: |
            - `NotFound` — сборочное задание не найдено
            - `StatusMismatch` — операция невозможна для этого статуса сборочного задания
            - `ImeiIsNotFilled` — не заполнен IMEI
            - `MetaValidationFail` — ошибки валидации идентификаторов маркировки
          example: NotFound
        metaDetails:
          type: array
          description: Детали ошибки валидации идентификаторов маркировки
          items:
            type: object
            required:
              - decision
              - key
            properties:
              key:
                type: string
                description: Идентификатор маркировки
                example: sgtin
              value:
                type: string
                nullable: true
                description: Значение идентификатора маркировки
                example: '1234567890'
              decision:
                type: string
                description: |
                  Статус проверки:
                  - `sgtin`
                    - `sgtinInvalidFormat` — Неверный формат маркировки
                    - `sgtinNotFound` — Маркировка не найдена в [Честном знаке](https://chestnyznak.ru)
                    - `sgtinEmitted` —  Маркировка эмитирована
                    - `sgtinApplied` — Не пройдена процедура Ввод в оборот
                    - `sgtinWrittenOff` — Списан
                    - `sgtinRetired` — Выбыл
                    - `sgtinWithdrawn` — Выбыл
                    - `sgtinDisaggregation` — Расформирован
                    - `sgtinDisaggregated` — Расформирован
                    - `sgtinAppliedNotPaid` — Не оплачен
                    - `pending` — Маркировка на проверке
                example: sgtinEmitted
      type: object
    api.MetaDeleteResponses:
      type: object
      required:
        - results
      properties:
        requestId:
          type: string
          description: Уникальный ID запроса. Отображается для ответов с ошибками
        results:
          type: array
          items:
            type: object
            required:
              - isError
              - orderId
            properties:
              errors:
                items:
                  type: object
                  required:
                    - code
                    - detail
                  properties:
                    code:
                      type: integer
                      description: |
                        Код ошибки:
                          - `404`
                          - `409`
                    detail:
                      type: string
                      description: |
                        - `NotFound` — сборочное задание не найдено
                        - `StatusMismatch` — операция невозможна для этого статуса сборочного задания
                        - `ImeiIsNotFilled` — не заполнен IMEI
                type: array
                description: Детали ошибки
              isError:
                type: boolean
                description: Есть ли ошибки
              orderId:
                type: integer
                description: ID сборочного задания с успешно обновлёнными данными
    api.OrdersRequestV2:
      type: object
      properties:
        ordersIds:
          type: array
          maxItems: 1000
          example:
            - 1234678898
          items:
            type: integer
          description: Список ID сборочных заданий
    api.OrdersMetaDleteRequestV2:
      type: object
      properties:
        key:
          type: string
          enum:
            - imei
            - uin
            - gtin
            - sgtin
          description: Название идентификатора маркировки для удаления. Передаётся только одно значение
          example: sgtin
        ordersIds:
          type: array
          maxItems: 1000
          items:
            type: integer
          description: Список ID сборочных заданий
          example:
            - 123456789
    ClientInfo:
      properties:
        replacementPhone:
          type: string
          description: |
            Подменный номер для связи с покупателем. <br>
            Пустое значение `""` указывает, что номер ещё не назначен
          example: '79871234567'
          nullable: false
        phone:
          type: string
          description: |
            Номер телефона для связи с покупателем:
              - если в поле `phoneCode` не указан добавочный код, вы можете позвонить покупателю по указанному номеру. Дополнительные номера телефонов для связи без кодов указаны в поле `additionalPhones`
              - если в поле `phoneCode` указан добавочный код, используйте его, чтобы связаться с покупателем по указанному номеру и добавочному коду
          example: '+79871234567'
          nullable: false
        firstName:
          type: string
          description: Имя покупателя
          example: Иван
          nullable: false
        fullName:
          type: string
          description: Полное имя покупателя, используется для оформления документов
          example: Иванов Иван Иванович
          nullable: false
        additionalPhones:
          nullable: false
          type: array
          items:
            type: string
          description: |
            Дополнительные номера телефонов для связи с покупателем. <br>
            Используйте, чтобы позвонить покупателю, если недоступен основной номер из `phone`. <br>
            Пустое значение означает, что номер не указан
          example:
            - '1234554321'
        additionalPhoneCodes:
          nullable: false
          type: array
          items:
            type: integer
          description: |
            Дополнительные добавочные коды. <br>
            Используйте, если не получилось дозвониться по добавочному коду из `phoneCode`.<br>
            Пустое значение указывает, коды ещё не назначены
          example:
            - 12345
        orderId:
          type: integer
          description: ID сборочного задания
          example: 1345678910
        phoneCode:
