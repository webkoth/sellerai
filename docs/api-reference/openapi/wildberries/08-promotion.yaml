components:
  schemas:
    V0BidsRecommendationsResponse:
      type: object
      properties:
        advertId:
          type: integer
          format: int64
          description: ID кампании
        base:
          $ref: '#/components/schemas/V0BidRecommendationBase'
        nmId:
          type: integer
          format: int64
          description: Артикул WB
        normQueries:
          type: array
          description: Рекомендуемые ставки для поисковых кластеров
          items:
            $ref: '#/components/schemas/V0BidRecommendationNormQuery'
    V0BidRecommendationBase:
      type: object
      description: Рекомендуемые ставки для карточек товаров
      properties:
        competitiveBid:
          $ref: '#/components/schemas/V0BidRecommendationBaseBidCompetitiveBid'
        leadersBid:
          $ref: '#/components/schemas/V0BidRecommendationBaseBidLeadersBid'
        top2:
          $ref: '#/components/schemas/V0BidRecommendationBaseBidTop2'
    V0BidRecommendationBaseBidTop2:
      description: |
        Топ-ставка
      type: object
      properties:
        bidKopecks:
          type: integer
          description: Рекомендуемая ставка, копеек. Если `0`, для данного предмета топ-ставка не используется
    V0BidRecommendationBaseBidCompetitiveBid:
      description: |
        Конкурентная ставка — расчётная средняя ставка других продавцов, продающих аналогичные товары по похожей цене.
        У половины продавцов из расчёта ставка выше конкурентной, а другой половины — ниже
      type: object
      properties:
        bidKopecks:
          type: integer
          description: Рекомендуемая ставка, копеек
    V0BidRecommendationBaseBidLeadersBid:
      description: |
        Лидерская ставка — средняя ставка с которой товары занимают лидирующие позиции в вашей категории товаров
      type: object
      properties:
        bidKopecks:
          type: integer
          description: Рекомендуемая ставка, копеек
    V0BidRecommendationNormQuery:
      type: object
      properties:
        normQuery:
          type: string
          description: Поисковый кластер
        reachMax:
          $ref: '#/components/schemas/V0BidRecommendationReachMax'
        reachMedium:
          $ref: '#/components/schemas/V0BidRecommendationReachMedium'
        reachMin:
          $ref: '#/components/schemas/V0BidRecommendationReachMin'
    V0BidRecommendationReachMax:
      type: object
      description: |
        Максимальный охват: 76-100%
      properties:
        bidKopecks:
          type: integer
          description: Рекомендуемая ставка в копейках
        bidKopecksMin:
          type: integer
          description: Минимальная ставка в копейках
    V0BidRecommendationReachMedium:
      description: |
        Средний охват: 61-75%
      type: object
      properties:
        bidKopecks:
          type: integer
          description: Рекомендуемая ставка в копейках
        bidKopecksMin:
          type: integer
          description: Минимальная ставка в копейках
    V0BidRecommendationReachMin:
      description: |
        Минимальный охват: 50-60%
      type: object
      properties:
        bidKopecks:
          type: integer
          description: Рекомендуемая ставка в копейках
        bidKopecksMin:
          type: integer
          description: Минимальная ставка в копейках
    V0GetNormQueryListRequest:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          maxItems: 100
          items:
            $ref: '#/components/schemas/V0GetNormQueryListRequestItem'
    V0GetNormQueryListRequestItem:
      type: object
      required:
        - advertId
        - nmId
      properties:
        advertId:
          type: integer
          format: int64
          description: ID кампании
        nmId:
          type: integer
          format: int64
          description: Артикул WB
    V0GetNormQueryListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/V0GetNormQueryListResponseItem'
    V0GetNormQueryListResponseItem:
      type: object
      properties:
        advertId:
          type: integer
          format: int64
          description: ID кампании
        nmId:
          type: integer
          format: int64
          description: Артикул WB
        normQueries:
          $ref: '#/components/schemas/V0GetNormQueryListResponseItemNormQueries'
    V0GetNormQueryListResponseItemNormQueries:
      type: object
      description: Поисковые кластеры
      properties:
        active:
          type: array
          items:
            type: string
          description: Активные поисковые кластеры
          nullable: true
        excluded:
          type: array
          nullable: true
          items:
            type: string
          description: Неактивные поисковые кластеры
    V1GetNormQueryStatsRequest:
      type: object
      required:
        - from
        - to
        - items
      properties:
        from:
          type: string
          format: date
          description: Дата начала периода
          example: '2025-01-01'
        to:
          type: string
          format: date
          description: Дата окончания периода периода
          example: '2025-01-31'
        items:
          type: array
          maxItems: 100
          items:
            type: object
            required:
              - advertId
              - nmId
            properties:
              advertId:
                type: integer
                format: int64
                description: ID кампании
              nmId:
                type: integer
                format: int64
                description: Артикул WB
    V1GetNormQueryStatsResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/V1GetNormQueryStatsResponseItem'
    V1GetNormQueryStatsResponseItem:
      type: object
      required:
        - advertId
        - nmId
      properties:
        advertId:
          type: integer
          format: int64
          description: ID кампании
        nmId:
          type: integer
          format: int64
          description: Артикул WB
        dailyStats:
          type: array
          items:
            $ref: '#/components/schemas/V1GetNormQueryStatsResponseItemDailyStat'
          description: Статистика с детализацией по дням
    V1GetNormQueryStatsResponseItemDailyStat:
      type: object
      required:
        - date
      properties:
        date:
          type: string
          format: date
          description: Дата
        stat:
          $ref: '#/components/schemas/V1GetNormQueryStatsResponseItemStat'
    V1GetNormQueryStatsResponseItemStat:
      type: object
      properties:
        normQuery:
          type: string
          description: Поисковый кластер
        views:
          type: integer
          nullable: true
          description: |
            Количество просмотров.

            Для кампаний с типом оплаты `cpc` — за клики — значение будет `null`
        clicks:
          type: integer
          description: Количество кликов
        atbs:
          type: integer
          description: Количество добавлений товаров в корзину
        orders:
          type: integer
          description: Количество заказов
        ctr:
          type: number
          format: float
          nullable: true
          description: |
            CTR (click-through rate) — отношение числа кликов к количеству показов в процентах.

            Для кампаний с типом оплаты `cpc` — за клики — значение будет `null`
        cpc:
          type: number
          format: float
          description: Средняя стоимость клика, ₽
        cpm:
          type: number
          nullable: true
          format: float
          description: |
            Средняя стоимость за тысячу показов, ₽.

            Для кампаний с типом оплаты `cpc` — за клики — значение будет `null`
        avgPos:
          type: number
          format: float
          description: Средняя позиция товара на страницах поисковой выдачи
        shks:
          type: integer
          description: Количество заказанных товаров, шт.
        spend:
          type: number
          format: double
          description: |
            Затраты на продвижение товаров в конкретном поисковом кластере кампании
    400Response:
      type: object
      properties:
        error:
          type: string
    PlacementType:
      type: string
      enum:
        - combined
        - search
        - recommendation
      description: |
        Места размещения:
          - `search` — поиск
          - `recommendation` — рекомендации
          - `combined` — поиск и рекомендации
    V0GetNormQueryStatsRequest:
      type: object
      required:
        - from
        - to
        - items
      properties:
        from:
          type: string
          format: date
          description: Дата начала периода
          example: '2025-10-07'
        to:
          type: string
          format: date
          description: Дата окончания периода
          example: '2025-10-08'
        items:
          type: array
          maxItems: 100
          items:
            type: object
            required:
              - advert_id
              - nm_id
            properties:
              advert_id:
                type: integer
                description: ID кампании
              nm_id:
                type: integer
                description: Артикул WB
    V0GetNormQueryStatsItem:
      type: object
      required:
        - advert_id
        - nm_id
      properties:
        advert_id:
          type: integer
          description: ID кампании
        nm_id:
          type: integer
          description: Артикул WB
        stats:
          type: array
