      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Пополнение бюджета кампании
      description: |
        Метод пополняет [бюджет](/openapi/promotion#tag/Finansy/paths/~1adv~1v1~1budget/get) кампании. <br>
        Чтобы запустить кампанию после пополнения бюджета, используйте метод [Запуск кампании](/openapi/promotion#tag/Upravlenie-kampaniyami/paths/~1adv~1v0~1start/get).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Сервисный | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Базовый с секретом | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Базовый | 1 ч | 5 запросов | 12 мин | 1 запрос |
        </div>
      tags:
        - Финансы
      parameters:
        - name: id
          in: query
          description: ID кампании
          schema:
            type: integer
            example: 1234567
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                sum:
                  description: Общая сумма пополнения бюджета
                  type: integer
                  example: 5000
                cashback_sum:
                  description: |
                    Сумма пополнения бюджета промо-бонусами.
                    <br>
                    Пополнить можно только определённый процент от общей суммы, указанный в поле `percent` ответа метода получения [баланса](./promotion#tag/Finansy/paths/~1adv~1v1~1balance/get).
                    <br>
                    Оставшаяся часть общей суммы спишется с указанного источника пополнения.
                    Пополнить можно только определённый процент от общей суммы, указанный в поле `percent` ответа метода получения [баланса](./promotion#tag/Finansy/paths/~1adv~1v1~1balance/get).
                    <br>
                    Оставшаяся часть общей суммы спишется с указанного источника пополнения.
                    <br>
                    Списать промо-бонусы можно только для источников пополнения:
                      - `0` — счёт
                      - `1` — баланс
                  type: integer
                  nullable: true
                  example: 1000
                cashback_percent:
                  description: |
                    Процент от суммы пополнения, который можно пополнить промо-бонусами. Нужно указать значение поля percent из ответа метода получения [баланса](./promotion#tag/Finansy/paths/~1adv~1v1~1balance/get)
                    <br>
                    Если вы указали `cashback_sum`, параметр `cashback_percent` становится обязательным
                  example: 50
                  type: integer
                  nullable: true
                type:
                  description: |
                    Тип источника пополнения:
                    - `0` — Счёт
                    - `1` — Баланс
                    - `3` — Бонусы
                  type: integer
                  example: 1
                return:
                  type: boolean
                  description: Флаг возврата ответа (`true` — в ответе вернется обновлённый размер бюджета кампании, `false` или не указать параметр вообще — не вернётся.)
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/ResponseWithReturn'
              examples:
                ResponseWithReturn:
                  $ref: '#/components/examples/ResponseWithReturn'
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
              examples:
                DepositAmountMultiple50:
                  description: Сумма пополнения должна быть кратна 50 руб
                  value:
                    error: Сумма пополнения должна быть кратна 50 руб
                MinimumDepositAmountIs500:
                  description: Минимальная сумма пополнения 1000 рублей
                  value:
                    error: Минимальная сумма пополнения 1000 рублей
                IncorrectType:
                  description: Неверный тип источника списания для пополнения промо-бонусами
                  value:
                    error: 'Invalid Params: cashback can not be used with such type'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v1/upd:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Получение истории затрат
      description: |
        Метод формирует список фактических затрат на рекламные кампании за заданный период.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Сервисный | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Базовый с секретом | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Базовый | 1 ч | 1 запрос | 1 ч | 1 запрос |
        </div>
      tags:
        - Финансы
      parameters:
        - name: from
          in: query
          description: Начало интервала
          schema:
            type: string
            format: date
            example: '2023-07-31'
          required: true
        - name: to
          in: query
          description: |
            Конец интервала. <br>
            (Минимальный интервал 1 день, максимальный 31)
          schema:
            type: string
            format: date
            example: '2023-08-02'
          required: true
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    updNum:
                      description: Номер выставленного документа
                      type: integer
                    updTime:
                      nullable: true
                      description: Время списания
                      type: string
                      format: time-date
                    updSum:
                      description: Выставленная сумма
                      type: integer
                    advertId:
                      description: ID кампании
                      type: integer
                    campName:
                      description: Название кампании
                      type: string
                    advertType:
                      description: Тип кампании
                      type: integer
                    paymentType:
                      description: |
                        Источник списания:
                         - `Баланс`
                         - `Бонусы`
                         - `Счёт`
                         - `Кэшбэк`
                      type: string
                    advertStatus:
                      description: |
                        Статус кампании:
                        - `-1` — удалена, процесс удаления будет завершён в течение 10 минут
                        - `4` — готова к запуску
                        - `7` — завершена
                        - `8` — отменена
                        - `9` — активна
                        - `11` — на паузе
                      type: integer
              example:
                - updNum: 0
                  updTime: '2023-07-31T12:12:54.060536+03:00'
                  updSum: 24
                  advertId: 3355881
                  campName: лук лучок
                  advertType: 6
                  paymentType: Баланс
                  advertStatus: 9
                - updNum: 0
                  updTime: null
                  updSum: 107
                  advertId: 3366882
                  campName: золотая луковица
                  advertType: 8
                  paymentType: Счет
                  advertStatus: 11
        '400':
          description: Неправильный запрос
          content:
            text/plain:
              schema:
                type: string
              examples:
                IncorrectSupplierIdAdv:
                  $ref: '#/components/examples/IncorrectSupplierIdAdv'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v1/payments:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Получение истории пополнений счёта
      description: |
        Метод возвращает историю пополнений счёта **WB Продвижение** за заданный период.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Сервисный | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Базовый с секретом | 1 сек | 1 запрос | 1 сек | 5 запросов |
        | Базовый | 1 ч | 1 запрос | 1 ч | 1 запрос |
        </div>
      tags:
        - Финансы
      parameters:
        - name: from
          in: query
          description: Начало интервала
          schema:
            type: string
            format: date
            example: '2023-07-31'
        - name: to
          in: query
          description: |
            Конец интервала. <br>
            (Минимальный интервал 1 день, максимальный 31)
          schema:
            type: string
            format: date
            example: '2023-08-02'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      description: ID платежа
                      type: integer
                    date:
                      description: Дата платежа
                      type: string
                      format: time-date
                    sum:
                      description: Сумма платежа
                      type: integer
                    type:
                      description: |
                        Тип источника списания:
                        - `0` — Счёт
                        - `1` — Баланс
                        - `3` — Картой
                      type: integer
                    statusId:
                      description: |
                        Статус:
                        - `0` — ошибка
                        - `1` — обработано
                      type: integer
                    cardStatus:
                      description: |
                        Статус операции(при оплате картой):
                        - `success` — успех
                        - `fail` — неуспех
                        - `pending` — в ожидании ответа
                        - `unknown` — неизвестно
                      type: string
              example:
                - id: 1036666
                  date: '2022-02-04T09:06:47.985843Z'
                  sum: 600
                  type: 0
                  statusId: 1
                  cardStatus: ''
                - id: 55261296
                  date: '2023-04-13T10:07:42'
                  sum: 1500
                  type: 3
                  statusId: 1
                  cardStatus: succeeded
        '204':
          description: История пополнений счета не найдена
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                type: string
              examples:
                IncorrectSupplierIdAdv:
                  $ref: '#/components/examples/IncorrectSupplierIdAdv'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/auction/nms:
    servers:
      - url: https://advert-api.wildberries.ru
    patch:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Изменение списка карточек товаров в кампаниях
      description: |
        Метод добавляет и удаляет карточки товаров в кампаниях.
        <br><br>
        Для кампаний в статусах `4`, `9` и `11`.
        <br><br>
        Для добавляемых товаров устанавливается текущая минимальная ставка.

         <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 1 запрос | 1 сек | 1 запрос |
        | Сервисный | 1 сек | 1 запрос | 1 сек | 1 запрос |
        | Базовый с секретом | 1 сек | 1 запрос | 1 сек | 1 запрос |
        | Базовый | 1 ч | 2 запроса | 30 мин | 1 запрос |
        </div>
      tags:
        - Управление кампаниями
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nms
              properties:
                nms:
                  description: Карточки товаров в кампаниях
                  type: array
                  maxItems: 20
                  items:
                    type: object
                    required:
                      - advert_id
                      - nms
                    properties:
                      advert_id:
                        description: ID кампании
                        type: integer
                        format: int64
                      nms:
                        description: Карточки товаров. Максимум 50 товаров для одной кампании
                        type: object
                        properties:
                          add:
                            description: Карточки товаров, которые необходимо добавить
                            items:
                              type: integer
                          delete:
                            description: Карточки товаров, которые необходимо удалить
                            type: array
                            items:
                              type: integer
            example:
              nms:
                - advert_id: 12345
                  nms:
                    add:
                      - 11111111
                      - 44444444
                    delete:
                      - 55555555
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                required:
                  - nms
                properties:
                  nms:
                    description: Результат отработки запроса
                    type: array
                    items:
                      type: object
                      required:
                        - advert_id
                        - nms
                      properties:
                        advert_id:
                          description: ID кампании
                          type: integer
                          format: int64
                        nms:
                          description: Карточки товаров
                          type: object
                          required:
                            - added
                            - deleted
                          properties:
                            added:
                              description: Добавленные карточки товаров
                              type: array
                              items:
                                type: integer
                            deleted:
                              description: Удалённые карточки товаров
                              type: array
                              items:
                                type: integer
              example:
                nms:
                  - advert_id: 12345
                    nms:
                      added:
                        - 11111111
                        - 44444444
                      deleted:
                        - 55555555
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response400'
              example:
                detail: nomenclature 13335157 cannot be both added and deleted for advert 27247695
                origin: camp-api-public-cache
                request_id: 6023d2950af564838f9b44a279d2140c
                status: 400
                title: invalid payload
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
