  /adv/v1/stats:
    servers:
      - url: https://advert-media-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Статистика медиакампаний
      description: |
        Метод формирует статистику кампаний сервиса [WB Медиа](https://cmp.wildberries.ru/cmpf/statistics). Статистику можно группировать по датам и/или интервалам.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 10 запросов | 100 мс | 10 запросов |
        | Сервисный | 1 сек | 10 запросов | 100 мс | 10 запросов |
        | Базовый с секретом | 1 сек | 10 запросов | 100 мс | 10 запросов |
        | Базовый | 1 ч | 1 запрос | 1 ч | 1 запрос |
        </div>
      tags:
        - Статистика
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              minItems: 1
              maxItems: 100
              items:
                oneOf:
                  - $ref: '#/components/schemas/RequestWithDate'
                  - $ref: '#/components/schemas/RequestWithInterval'
                  - $ref: '#/components/schemas/RequestWithCampaignID'
            examples:
              RequestWithDate:
                $ref: '#/components/examples/RequestWithDate'
              RequestWithInterval:
                $ref: '#/components/examples/RequestWithInterval'
              RequestWithoutParam:
                $ref: '#/components/examples/RequestWithoutParam'
              RequestAggregate:
                $ref: '#/components/examples/RequestAggregate'
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                items:
                  oneOf:
                    - $ref: '#/components/schemas/StatInterval'
                    - $ref: '#/components/schemas/StatDate'
                    - $ref: '#/components/schemas/Stat'
                    - $ref: '#/components/schemas/StatCampaignNotFound'
              examples:
                RespStatMediaInterval:
                  $ref: '#/components/examples/RespStatMediaInterval'
                RespStatMediaDates:
                  $ref: '#/components/examples/RespStatMediaDates'
                RespStatMediaWithoutParam:
                  $ref: '#/components/examples/RespStatMediaWithoutParam'
                RespStatMediaAggregate:
                  $ref: '#/components/examples/RespStatMediaAggregate'
                RespStatCampaignNotFound:
                  $ref: '#/components/examples/RespStatCampaignNotFound'
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/responseAdvError1'
              examples:
                invalidAdvert:
                  $ref: '#/components/examples/incorrectRequestBody'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
