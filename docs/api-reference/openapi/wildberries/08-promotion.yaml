          - 3
          - 64
        uniqueItems: true
        minItems: 1
        maxItems: 100
    offset:
      in: query
      name: offset
      description: После какого элемента выдавать данные
      schema:
        type: integer
        format: uint
        minimum: 0
        example: 0
    startDateTime:
      in: query
      name: startDateTime
      description: Начало периода, формат `YYYY-MM-DDTHH:MM:SSZ`
