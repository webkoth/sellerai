openapi: 3.0.1
info:
  title: Маркетинг и продвижение
  version: promotion
  description: |
    <div class="description_important">
      Узнать больше о маркетинге и продвижении можно в <a href="https://seller.wildberries.ru/instructions/category/59d92bd3-6ea0-40f2-b762-ca8835d7d42e?goBackOption=prevRoute&categoryId=479385c6-de01-4b4d-ad4e-ed941e65582e">справочном центре</a>
    </div>

    <div class="api-block">

    Методы маркетинга и продвижения позволяют:
      1. Получать информацию о кампаниях [продвижения](/openapi/promotion#tag/Kampanii) и [медиакампаниях](/openapi/promotion#tag/Media)
      2. [Создавать](/openapi/promotion#tag/Sozdanie-kampanij) и [управлять](/openapi/promotion#tag/Upravlenie-kampaniyami) кампаниями
      3. Управлять [финансами](/openapi/promotion#tag/Finansy) кампаний
      4. Выгружать [статистику](/openapi/promotion#tag/Statistika) кампаний продвижения и медиакампаний
      5. Работать с [календарём акций](/openapi/promotion#tag/Kalendar-akcij)
      6. Устанавливать [рекомендации](/openapi/promotion#tag/recommendations) для товаров

    Данные синхронизируются с базой раз в 3 минуты. Статусы кампаний меняются раз в минуту. Ставки кампаний меняются раз в 30 секунд.

    </div>
  x-file-name: promotion
security:
  - HeaderApiKey: []
tags:
  - name: Кампании
    description: ''
  - name: Создание кампаний
    description: ''
  - name: Управление кампаниями
    description: ''
  - name: Поисковые кластеры
    description: ''
  - name: Финансы
    description: ''
  - name: Медиа
    description: ''
  - name: Статистика
    description: ''
  - name: Календарь акций
    description: ''
  - name: Рекомендации
    x-displayName: Рекомендации
    description: ''
paths:
  /adv/v1/promotion/count:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Списки кампаний
      description: |
        Метод возвращает списки всех [рекламных кампаний](/openapi/promotion#tag/Kampanii/paths/~1api~1advert~1v2~1adverts/get) продавца с их ID. Кампании сгруппированы по типу и статусу, у каждой указана дата последнего изменения.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Сервисный | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Базовый с секретом | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Базовый | 1 ч | 4 запроса | 15 мин | 1 запрос |
        </div>
      tags:
        - Кампании
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                properties:
                  adverts:
                    type: array
                    nullable: true
                    description: Данные по кампаниям
                    items:
                      type: object
                      properties:
                        type:
                          description: |
                            Тип кампании:
                              - `8` — кампания с единой ставкой (**устаревший тип**)
                              - `9` — кампания с единой или ручной ставкой. Тип ставки вы можете получить с помощью метода [Информация о кампаниях](./promotion#tag/Kampanii/paths/~1api~1advert~1v2~1adverts/get), поле `bid_type`
                          type: integer
                        status:
                          description: Статус кампании
                          type: integer
                        count:
                          description: Количество кампаний
                          type: integer
                        advert_list:
                          description: Список кампаний
                          type: array
                          items:
                            type: object
                            properties:
                              advertId:
                                description: ID кампании
                                type: integer
                              changeTime:
                                description: Дата и время последнего изменения кампании
                                type: string
                                format: date-time
                  all:
                    description: Общее количество кампаний всех статусов и типов
                    type: integer
              example:
                adverts:
                  - type: 9
                    status: 8
                    count: 3
                    advert_list:
                      - advertId: 6485174
                        changeTime: '2023-05-10T12:12:52.676254+03:00'
                      - advertId: 6500443
                        changeTime: '2023-05-10T17:08:46.370656+03:00'
                      - advertId: 7936341
                        changeTime: '2023-07-12T15:51:08.367478+03:00'
                all: 3
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/advert/v2/adverts:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Информация о кампаниях
      description: |
        Метод возвращает информацию о рекламных кампаниях с единой или ручной ставкой по их статусам, типам оплаты и ID.

         <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Сервисный | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Базовый с секретом | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Базовый | 1 ч | 1 запрос | 1 ч | 1 запрос |
        </div>
      tags:
        - Кампании
      parameters:
        - name: ids
          in: query
          description: ID кампаний, максимум 50
          schema:
            type: string
            example: 12345,23456,34567,45678,56789
        - name: statuses
          in: query
          description: |
            Статусы кампаний:
            - `-1` — удалена, процесс удаления будет завершён в течение 10 минут
            - `4` — готова к запуску
            - `7` — завершена
            - `8` — отменена
            - `9` — активна
            - `11` — на паузе
          schema:
            type: string
            example: '-1,4,8'
        - name: payment_type
          in: query
          description: |
            Тип оплаты:
            - `cpm` — за показы
            - `cpc` — за клик
          schema:
            type: string
            enum:
              - cpm
              - cpc
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAdverts'
              example:
                adverts:
                  - bid_type: manual
                    id: 567456457
                    nm_settings:
                      - bids_kopecks:
                          recommendations: 0
                          search: 0
                        nm_id: 123456789
                        subject:
                          id: 52
                          name: кошельки
                      - bids_kopecks:
                          recommendations: 11200
                          search: 11200
                        nm_id: 987654321
                        subject:
                          id: 54
                          name: ювелирные кольца
                    settings:
                      name: Кампания от 01.02.2024
                      payment_type: cpm
                      placements:
                        recommendations: false
                        search: true
                    status: 7
                    timestamps:
                      created: '2024-02-01T09:57:38.500606+03:00'
                      deleted: '2024-02-05T14:29:32.633968+03:00'
                      started: '2024-02-05T12:38:10.212086+03:00'
                      updated: '2024-02-05T14:29:32.633968+03:00'
                  - bid_type: manual
                    id: 28150154
                    nm_settings:
                      - bids_kopecks:
                          recommendations: 0
                          search: 1100
                        nm_id: 5764746785
                        subject:
                          id: 69
                          name: платья
                    settings:
                      name: 'Кампания от 28.08.2025 '
                      payment_type: cpc
                      placements:
                        recommendations: false
                        search: true
                    status: 11
                    timestamps:
                      created: '2025-08-28T09:50:57.611559+03:00'
                      deleted: '2100-01-01T00:00:00+03:00'
                      started: null
                      updated: '2025-09-10T10:14:58.475499+03:00'
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/response400'
              example:
                detail: invalid payment_type value
                origin: camp-api-public-cache
                request_id: 7e5cb1f106cc6e85b5b29eb2e8815da2
                status: 400
                title: invalid payload
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /api/advert/v1/bids/min:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: advert
      tags:
        - Создание кампаний
      summary: Минимальные ставки для карточек товаров
      description: |
        Метод возвращает минимальные ставки для карточек товаров в копейках по типу оплаты и местам размещения.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 мин | 20 запросов | 3 сек | 5 запросов |
        | Сервисный | 1 мин | 20 запросов | 3 сек | 5 запросов |
        | Базовый с секретом | 1 мин | 20 запросов | 3 сек | 5 запросов |
        | Базовый | 1 ч | 5 запросов | 12 мин | 1 запрос |
        </div>
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - advert_id
                - nm_ids
                - payment_type
                - placement_types
              properties:
                advert_id:
                  type: integer
                  format: int64
                  description: ID кампании
                nm_ids:
                  type: array
                  minLength: 1
                  maxLength: 100
                  items:
                    type: integer
                    format: int64
                  description: Список артикулов WB
                payment_type:
                  type: string
                  enum:
                    - cpm
                    - cpc
                  description: |
                    Тип оплаты:
                          - `cpm` — за показы
                          - `cpc` — за клик
                placement_types:
                  description: |
                    Места размещения:
                      - `search` — поиск
                      - `recommendation` — рекомендации
                      - `combined` — поиск и рекомендации
                  type: array
                  items:
                    type: string
                    enum:
                      - combined
                      - search
                      - recommendation
            example:
              advert_id: 98765432
              nm_ids:
                - 12345678
                - 87654321
              payment_type: cpm
              placement_types:
                - combined
                - search
                - recommendation
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: object
                required:
                  - bids
                properties:
                  bids:
                    type: array
                    description: Список карточек товаров со ставками
                    items:
                      type: object
                      required:
                        - nm_id
                        - bids
                      properties:
                        bids:
                          type: array
                          description: Список ставок по местам размещения
                          items:
                            type: object
                            required:
                              - type
                              - value
                            properties:
                              type:
                                $ref: '#/components/schemas/PlacementType'
                              value:
                                type: integer
                                description: Минимальная ставка, копейки
                        nm_id:
                          type: integer
                          format: int64
                          description: Артикул WB
              example:
                bids:
                  - bids:
                      - type: combined
                        value: 155
                      - type: search
                        value: 250
                      - type: recommendation
                        value: 250
                    nm_id: 12345678
                  - bids:
                      - type: combined
                        value: 155
                      - type: search
                        value: 250
                      - type: recommendation
                        value: 250
                    nm_id: 87654321
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardizedBatchError'
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v2/seacat/save-ad:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Создать кампанию
      description: |
        Метод создаёт кампанию:
          - с ручной ставкой для продвижения товаров в поиске и/или рекомендациях
          - с единой ставкой для продвижения товаров одновременно в поиске и рекомендациях

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 мин | 5 запросов | 12 сек | 5 запросов |
        | Сервисный | 1 мин | 5 запросов | 12 сек | 5 запросов |
        | Базовый с секретом | 1 мин | 5 запросов | 12 сек | 5 запросов |
        | Базовый | 1 ч | 5 запросов | 12 мин | 1 запрос |
        </div>
      tags:
        - Создание кампаний
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  description: Название кампании
                  type: string
                nms:
                  type: array
                  description: |
                    Карточки товаров для кампании. Доступные карточки товаров можно получить с помощью метода [Карточки товаров для кампаний](./promotion#tag/Sozdanie-kampanij/paths/~1adv~1v2~1supplier~1nms/post). Максимум 50 товаров (`nm`)
                  items:
                    type: integer
                    description: Артикул WB (`nmId`)
                bid_type:
                  type: string
                  default: manual
                  enum:
                    - manual
                    - unified
                  description: |
                    Тип ставки:
                      - `manual` — ручная
                      - `unified` — единая
                payment_type:
                  type: string
                  default: cpm
                  enum:
                    - cpm
                    - cpc
                  description: |
                    Тип оплаты:
                    - `cpm` — за показы
                    - `cpc` — за клик. При создании с этим типом оплаты в кампании автоматически устанавливается минимальная ставка
                placement_types:
                  type: array
                  default:
                    - search
                  description: |
                    Места размещения:
                      - `search` — в поиске
                      - `recommendations` — в рекомендациях

                    Укажите только для кампании с ручной ставкой
                  items:
                    type: string
                    enum:
                      - search
                      - recommendations
            example:
              name: Телефоны
              nms:
                - 146168367
                - 200425104
              bid_type: manual
              placement_types:
                - search
                - recommendations
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: integer
                description: ID кампании
                example: 1234567
        '400':
          description: Неправильный запрос
          content:
            application/json:
              schema:
                type: string
              example: Нет доступных категорий для рк. Создайте новую кампанию для попадания в текущие категории
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v1/supplier/subjects:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Предметы для кампаний
      description: |
        Метод возвращает список [предметов](/openapi/work-with-products#tag/Kategorii-predmety-i-harakteristiki/paths/~1content~1v2~1object~1all/get), которые можно добавить в рекламную [кампанию](/openapi/promotion#tag/Kampanii/paths/~1api~1advert~1v2~1adverts/get).

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 12 сек | 1 запрос | 12 сек | 5 запросов |
        | Сервисный | 12 сек | 1 запрос | 12 сек | 5 запросов |
        | Базовый с секретом | 12 сек | 1 запрос | 12 сек | 5 запросов |
        | Базовый | 1 ч | 2 запроса | 30 мин | 1 запрос |
        </div>
      parameters:
        - name: payment_type
          in: query
          description: |
            Тип оплаты:
            - `cpm` — за показы
            - `cpc` — за клик
          schema:
            type: string
            default: cpm
          required: false
      tags:
        - Создание кампаний
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                nullable: true
                x-nullable: true
                items:
                  type: object
                  properties:
                    id:
                      description: ID предмета
                      type: integer
                    name:
                      description: Предмет
                      type: string
                    count:
                      description: Количество Артикулов WB (`nmId`) с таким предметом.
                      type: integer
              examples:
                Array:
                  value:
                    - name: 3D очки
                      id: 2560
                      count: 1899
                'null':
                  value: null
        '401':
          $ref: '#/components/responses/401'
        '404':
          description: Не найдено
        '429':
          $ref: '#/components/responses/429'
  /adv/v2/supplier/nms:
    servers:
      - url: https://advert-api.wildberries.ru
    post:
      x-readonly-method: true
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Карточки товаров для кампаний
      description: |
        Метод возвращает список [карточек товаров](/openapi/work-with-products#tag/Kartochki-tovarov/paths/~1content~1v2~1get~1cards~1list/post), которые можно добавить в рекламную [кампанию](/openapi/promotion#tag/Kampanii/paths/~1api~1advert~1v2~1adverts/get). Для получения карточек необходимы ID [предметов](/openapi/promotion#tag/Sozdanie-kampanij/paths/~1adv~1v1~1supplier~1subjects/get), также доступных для добавления в кампанию.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 мин | 5 запросов | 12 сек | 5 запросов |
        | Сервисный | 1 мин | 5 запросов | 12 сек | 5 запросов |
        | Базовый с секретом | 1 мин | 5 запросов | 12 сек | 5 запросов |
        | Базовый | 1 ч | 2 запроса | 30 мин | 1 запрос |
        </div>
      tags:
        - Создание кампаний
      requestBody:
        description: ID предметов, для которых нужно получить карточки товаров
        content:
          application/json:
            schema:
              type: array
              items:
                type: integer
            example:
              - 123
              - 456
              - 765
              - 321
      responses:
        '200':
          description: Успешно
          content:
            application/json:
              schema:
                type: array
                nullable: true
                description: Карточки товаров для кампаний
                items:
                  type: object
                  properties:
                    title:
                      type: string
                      description: Название товара
                      example: Плед
                    nm:
                      type: integer
                      description: Артикул WB
                      example: 146168367
                    subjectId:
                      type: integer
                      description: ID предмета
                      example: 765
        '400':
          description: Неправильный запрос
          content:
            text/plain:
              schema:
                type: string
              example: Ошибка обработки тела запроса
        '401':
          $ref: '#/components/responses/401'
        '429':
          $ref: '#/components/responses/429'
  /adv/v0/delete:
    servers:
      - url: https://advert-api.wildberries.ru
    get:
      x-readonly-method: false
      x-category: advert
      security:
        - HeaderApiKey: []
      summary: Удаление кампании
      description: |
        Метод удаляет [кампании](/openapi/promotion#tag/Kampanii/paths/~1api~1advert~1v2~1adverts/get) в статусе `4` — готова к запуску.<br><br>

        После удаления кампания некоторое время будет находиться в статусе `-1` — кампания в процессе удаления. Полное удаление кампании занимает от 3 до 10 минут.

        <div class="description_limit">
        <a href="/openapi/api-information#tag/Vvedenie/Limity-zaprosov">Лимит запросов</a> на один аккаунт продавца:


        | Тип | Период | Лимит | Интервал | Всплеск |
        | --- | --- | --- | --- | --- |
        | Персональный | 1 сек | 5 запросов | 200 мс | 5 запросов |
        | Сервисный | 1 сек | 5 запросов | 200 мс | 5 запросов |
